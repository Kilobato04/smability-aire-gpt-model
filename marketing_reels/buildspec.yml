version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "📦 Instalando dependencias (FFmpeg, Playwright, Requests)..."
      - apt-get update -y
      - apt-get install -y ffmpeg
      - pip install playwright boto3 requests
      - playwright install --with-deps chromium
  build:
    commands:
      - if [ -z "$FLOW_ID" ]; then echo "❌ ERROR FATAL - FLOW_ID esta vacio. Abortando fabrica."; exit 1; fi
      - echo "🎬 Generando Reel y publicando en Instagram..."
      - cd marketing_reels
      - python render_reel.py
  post_build:
    commands:
      - echo "☁️ Subiendo video maestro a S3..."
      - aws s3 cp /tmp/reel_final.mp4 s3://$S3_BUCKET/outputs/reel_${FLOW_ID}.mp4
      - echo "✅ ¡El Reel está listo en la bodega!"
