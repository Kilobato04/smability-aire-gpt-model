version: 0.2

phases:
  pre_build:
    commands:
      - echo "🔐 Iniciando sesión en Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/airegpt-marketing-engine
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo "📦 Construyendo la imagen de Docker para Marketing Engine..."
      # Se asume que el buildspec corre dentro del directorio marketing_engine
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "☁️ Subiendo la imagen a ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "🔄 Actualizando la función Lambda con la nueva imagen..."
      - aws lambda update-function-code --function-name MarketingReelGenerator --image-uri $REPOSITORY_URI:latest
      - echo "✅ Build y despliegue completados exitosamente."
