version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "📦 Instalando dependencias del sistema operativo..."
      - apt-get update -y
      - apt-get install -y ffmpeg
      - pip install -r marketing_reels/requirements.txt
      - playwright install --with-deps chromium
  build:
    commands:
      - echo "🎬 Arrancando motor de Marketing..."
      - cd marketing_reels
      # Si la variable MODE es "mapa", corre el script nuevo. Si no, corre el normal.
      - if [ "$MODE" = "map" ]; then python render_map_reel.py; else python render_reel.py; fi
  post_build:
    commands:
      - echo "✅ Misión cumplida. Archivos subidos a S3 y publicados en Meta."
      - echo "🧹 Limpieza automática completada."
