<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smability CRM | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #0f172a; font-family: 'Inter', sans-serif; color: #e2e8f0; height: 100vh; overflow: hidden; display: flex; }
        
        /* --- SIDEBAR DE NAVEGACIÓN --- */
        .sidebar-nav {
            width: 260px; background: rgba(15, 23, 42, 0.95); 
            border-right: 1px solid rgba(56, 189, 248, 0.2);
            display: flex; flex-direction: column; padding: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10;
        }

        .brand { 
            font-size: 18px; font-weight: 700; color: #38bdf8; 
            letter-spacing: -0.5px; margin-bottom: 30px; 
            display: flex; align-items: center; gap: 10px;
        }
        .brand span { color: #fff; opacity: 0.5; font-size: 12px; font-weight: 400; border: 1px solid #475569; padding: 2px 6px; border-radius: 4px; }

        .metric-card {
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 8px; margin-bottom: 10px;
        }
        .metric-val { font-family: 'Roboto Mono'; font-size: 24px; color: #fff; font-weight: 600; }
        .metric-lbl { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        /* --- ÁREA PRINCIPAL --- */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        
        .header-dash { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .page-title { font-size: 22px; font-weight: 600; color: #fff; }
        .refresh-btn {
            background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .refresh-btn:hover { background: rgba(56, 189, 248, 0.2); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        /* --- GRÁFICA --- */
        .chart-container {
            width: 100%; height: 250px; background: #1e293b; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; margin-bottom: 25px; padding: 15px; box-sizing: border-box;
        }
        .chart-title { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px;}

        /* --- TABLA DE USUARIOS --- */
        .badge { font-size: 9px; padding: 3px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .badge.premium { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .badge.free { background: rgba(148, 163, 184, 0.1); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.2); }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 4px; font-size: 11px;}
        .stat-row:last-child { border: none; }
        .stat-key { color: #94a3b8; }
        .stat-val { font-family: 'Roboto Mono'; color: #fff; }

        .section-title { font-size: 10px; font-weight: 700; color: #38bdf8; text-transform: uppercase; margin: 12px 0 6px 0; letter-spacing: 0.5px; }

        /* LOADING */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(56,189,248,0.3); 
            border-top: 3px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite;
        }

        /* ESTILOS DE FILA ACORDEÓN */
        .users-list { display: flex; flex-direction: column; gap: 10px; }
        .user-row { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; transition: all 0.2s; }
        .user-row:hover { border-color: rgba(56, 189, 248, 0.4); }
        .row-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: linear-gradient(to right, rgba(56,189,248,0.05), transparent); }
        .row-basic-info { display: flex; gap: 15px; align-items: center; width: 60%; }
        .row-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-id { font-family: 'Roboto Mono'; font-size: 11px; color: #64748b; }
        
        /* El secreto del Acordeón */
        .row-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(15, 23, 42, 0.5); border-top: 1px solid transparent; }
        .user-row.expanded .row-details { max-height: 2000px; border-top-color: rgba(255,255,255,0.05); }
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        
        .load-more-btn { width: 100%; padding: 15px; margin-top: 20px; background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px dashed rgba(56, 189, 248, 0.3); border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .load-more-btn:hover { background: rgba(56, 189, 248, 0.2); }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* --- RESPONSIVE MOBILE FIX --- */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .sidebar-nav { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 15px; border-right: none; border-bottom: 1px solid rgba(56, 189, 248, 0.2); box-sizing: border-box;}
            .brand { width: 100%; margin-bottom: 15px; justify-content: center; }
            
            /* Tarjetas métricas en Grid 2x2 para móvil */
            .metric-card { width: 48%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; text-align: center; }
            .metric-val { font-size: 18px; }
            
            .main-content { padding: 15px; width: 100%; box-sizing: border-box; }
            .header-dash { flex-direction: column; align-items: stretch; gap: 15px; }
            .refresh-btn { justify-content: center; }
            
            .row-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .row-basic-info { width: 100%; flex-wrap: wrap; }
            .details-grid { grid-template-columns: 1fr; } /* Columna única en móvil */
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 12px; color: #64748b;">Analizando inteligencia...</p>
    </div>

    <div class="sidebar-nav">
        <div class="brand">Smability <span>CRM</span></div>
        
        <div class="metric-card">
            <div class="metric-val" id="total-users">-</div>
            <div class="metric-lbl">Usuarios</div>
        </div>

        <div class="metric-card">
            <div class="metric-val" id="active-alerts">-</div>
            <div class="metric-lbl">Alertas</div>
        </div>

        <div class="metric-card">
            <div class="metric-val" id="premium-count" style="color: #4ade80;">-</div>
            <div class="metric-lbl">Premium</div>
        </div>

        <div class="metric-card">
            <div class="metric-val" id="total-mrr" style="color: #38bdf8;">$0</div>
            <div class="metric-lbl">MRR (MXN)</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-dash">
            <div class="page-title">Gestión Táctica</div>
            <button class="refresh-btn" onclick="fetchData()">🔄 Actualizar Datos</button>
        </div>

        <div class="chart-container">
            <div class="chart-title">📈 Crecimiento de MRR (Mensual)</div>
            <div id="mrr-chart" style="width: 100%; height: 200px;"></div>
        </div>

        <div id="users-container" class="users-list"></div>
    </div>

    <script>
        // CONFIGURACIÓN
        const API_URL = "https://3s2niqf45lksfqfmrc2cg2ivpi0fealf.lambda-url.us-east-1.on.aws/?action=list_users&key=02Kilobaterias";

        let currentNextKey = null; 
        let accumulatedAlerts = 0; 
        let accumulatedPremium = 0; 
        let currentMRR = 0;
        let mrrHistory = {}; // Para agrupar dinero por mes { "2026-01": 49, "2026-02": 329 }

        async function fetchData(loadMore = false) {
            const loader = document.getElementById('loader');
            const container = document.getElementById('users-container');
            
            if (!loadMore) { 
                container.innerHTML = ''; 
                accumulatedAlerts = 0; 
                accumulatedPremium = 0; 
                currentMRR = 0;
                mrrHistory = {};
            }
            loader.style.display = 'flex';

            let url = API_URL;
            if (loadMore && currentNextKey) url += `&last_key=${encodeURIComponent(currentNextKey)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                currentNextKey = data.next_key || null; 

                // Ordenar: PREMIUM primero
                let sortedUsers = data.users.sort((a, b) => {
                    if (a.status === 'PREMIUM' && b.status !== 'PREMIUM') return -1;
                    if (a.status !== 'PREMIUM' && b.status === 'PREMIUM') return 1;
                    return 0;
                });

                let startIndex = document.querySelectorAll('.user-row').length + 1;

                sortedUsers.forEach(u => {
                    container.appendChild(createUserRow(u, startIndex));
                    startIndex++; 

                    accumulatedAlerts += (u.quotas?.alerts?.used || 0);
                    if (u.status === 'PREMIUM') accumulatedPremium++;

                    // LÓGICA DE INGRESOS (MRR)
                    let amount = parseFloat(u.subscription?.amount) || 0;
                    if (u.subscription?.frequency === 'Anual') {
                        amount = amount / 12; // Pro-rateamos el anual para el MRR mensual
                    }
                    currentMRR += amount;

                    // Agrupar por mes para la gráfica
                    let firstSeen = u.crm_metrics?.first_seen; // "2026-01-28 06:05 PM"
                    if (firstSeen && firstSeen !== 'N/A') {
                        let monthKey = firstSeen.substring(0, 7); // Extrae "YYYY-MM"
                        if (!mrrHistory[monthKey]) mrrHistory[monthKey] = 0;
                        mrrHistory[monthKey] += amount;
                    }
                });

                const isMore = currentNextKey ? '+' : '';
                document.getElementById('total-users').innerText = document.querySelectorAll('.user-row').length + isMore;
                document.getElementById('active-alerts').innerText = accumulatedAlerts + isMore;
                document.getElementById('premium-count').innerText = accumulatedPremium + isMore;
                document.getElementById('total-mrr').innerText = '$' + currentMRR.toFixed(2);

                // DIBUJAR GRÁFICA PLOTLY
                renderChart();

                let btn = document.getElementById('load-more-btn');
                if (currentNextKey) {
                    if (!btn) {
                        btn = document.createElement('button');
                        btn.id = 'load-more-btn';
                        btn.className = 'load-more-btn';
                        btn.innerText = 'Cargar siguientes 50 usuarios 👇';
                        btn.onclick = () => fetchData(true);
                        container.parentElement.appendChild(btn);
                    }
                } else if (btn) {
                    btn.remove(); 
                }

            } catch (error) {
                console.error(error);
                alert("Error cargando datos del endpoint.");
            } finally { loader.style.display = 'none'; }
        }

        function renderChart() {
            // Convertimos el diccionario a Arrays ordenados cronológicamente
            let months = Object.keys(mrrHistory).sort();
            let amounts = months.map(m => mrrHistory[m]);

            // Hacemos el MRR acumulativo (Las suscripciones se suman mes a mes)
            let cumulativeAmounts = [];
            let acc = 0;
            for(let val of amounts) { acc += val; cumulativeAmounts.push(acc); }

            var trace = {
                x: months,
                y: cumulativeAmounts,
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#38bdf8', width: 3, shape: 'spline' },
                marker: { size: 8, color: '#e2e8f0' },
                fill: 'tozeroy',
                fillcolor: 'rgba(56, 189, 248, 0.1)'
            };

            var layout = {
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent',
                margin: { t: 10, l: 40, r: 20, b: 30 },
                xaxis: { showgrid: false, tickfont: { color: '#64748b', size: 10 } },
                yaxis: { showgrid: true, gridcolor: 'rgba(255,255,255,0.05)', tickprefix: '$', tickfont: { color: '#64748b', size: 10 } }
            };

            Plotly.newPlot('mrr-chart', [trace], layout, {displayModeBar: false, responsive: true});
        }

        function toggleRow(element) {
            element.parentElement.classList.toggle('expanded');
        }

        function createUserRow(u, index) {
            const div = document.createElement('div');
            div.className = 'user-row';
            const isPremium = u.status === 'PREMIUM';

            // --- 🫁 PARSER DE SALUD ---
            let conditionsHtml = 'Ninguna';
            if (u.health_and_transport?.conditions && u.health_and_transport.conditions.length > 0) {
                conditionsHtml = `<span style="color:#f59e0b; font-weight:600;">⚠️ ${u.health_and_transport.conditions.join(', ')}</span>`;
            }

            // --- 📊 PARSER DE HISTORIAL DE SALUD (CUADRANTE 5) ---
            let historyHtml = '';
            if (u.health_and_transport?.historical && u.health_and_transport.historical.length > 0) {
                let recentHistory = u.health_and_transport.historical.slice(-3).reverse();
                recentHistory.forEach(h => {
                    historyHtml += `
                    <div style="border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 4px; margin-bottom: 4px;">
                        <div style="display:flex; justify-content:space-between; font-size:10px;">
                            <span style="color:#94a3b8">${h.fecha}</span>
                            <span style="color:#f87171">🚬 ${h.cigarros} | ⏳ ${h.dias_edad}</span>
                        </div>
                    </div>`;
                });
            } else {
                historyHtml = '<div style="color:#64748b; font-style:italic; font-size:11px;">Sin historial previo</div>';
            }

            // --- 📍 PARSER DE UBICACIONES Y ALERTAS (CON DÍAS) ---
            let locsHTML = '';
            if (u.locations_snapshot && u.locations_snapshot.length > 0) {
                u.locations_snapshot.forEach(loc => {
                    let alertInfo = [];
                    
                    if (loc.config.schedule_report) {
                        let daysRaw = loc.config.schedule_days || [];
                        let daysStr = '';
                        if (daysRaw.length === 7) daysStr = ' (L-D)';
                        else if (daysRaw.length === 5) daysStr = ' (L-V)';
                        else if (daysRaw.length === 2) daysStr = ' (Fin)';
                        else if (daysRaw.length > 0) daysStr = ` (${daysRaw.length}d)`;

                        alertInfo.push(`⏰ ${loc.config.schedule_report} <span style="color:#38bdf8">${daysStr}</span>`);
                    }
                    if (loc.config.threshold_alert) alertInfo.push(`🚨 ${loc.config.threshold_alert}`);
                    
                    let alertStr = alertInfo.length > 0 ? alertInfo.join(' | ') : '<span style="color:#64748b">Sin alertas</span>';
                    
                    locsHTML += `
                        <div style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 6px; margin-bottom: 6px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                <strong style="color:#e2e8f0;">${loc.name}</strong>
                                <span style="font-size:9px; color:${loc.is_active ? '#4ade80' : '#ef4444'}">${loc.is_active ? 'ON' : 'OFF'}</span>
                            </div>
                            <div style="font-size: 10px; color: #94a3b8;">${alertStr}</div>
                        </div>
                    `;
                });
            } else {
                locsHTML = '<div style="color:#64748b; font-style:italic; font-size:11px;">Sin ubicaciones configuradas</div>';
            }

            // --- 💳 PARSER DE STRIPE Y PRECIO ---
            const stripeCus = u.subscription.stripe_customer_id || 'N/A';
            const stripeSub = u.subscription.stripe_subscription_id ? `<br><span style="font-size:9px; color:#64748b; word-break: break-all;">${u.subscription.stripe_subscription_id}</span>` : '';
            const precioMonto = u.subscription.amount || 0;
            const precioFreq = u.subscription.frequency || 'N/A';

            // --- ⏱️ PARSER DE TIEMPO (CHURN) ---
            const lastSeen = u.crm_metrics.last_seen ? u.crm_metrics.last_seen.split(' ')[0] : 'N/A';
            const firstSeen = u.crm_metrics.first_seen ? u.crm_metrics.first_seen.split(' ')[0] : 'N/A';
            const daysInactive = u.crm_metrics.days_inactive;
            const inactiveColor = daysInactive > 7 ? '#ef4444' : '#94a3b8';

            div.innerHTML = `
                <div class="row-header" onclick="toggleRow(this)">
                    <div class="row-basic-info">
                        <span style="color: #64748b; font-size: 11px; margin-right: 5px; min-width: 20px;">#${index}</span>
                        <span class="badge ${isPremium ? 'premium' : 'free'}">${isPremium ? 'PREMIUM' : 'FREE'}</span>
                        <span class="row-name">${u.name}</span>
                        <span class="row-id">ID: ${u.user_id}</span>
                    </div>
                    <div style="font-size: 11px; color: ${inactiveColor}; font-weight: ${daysInactive > 7 ? '600' : '400'};">
                        Visto: ${lastSeen} (${daysInactive}d off) 🔽
                    </div>
                </div>
                
                <div class="row-details">
                    <div class="details-grid">
                        
                        <div>
                            <div class="section-title">🛡️ Suscripción & Pago</div>
                            <div class="stat-row"><span class="stat-key">Plan:</span> <span class="stat-val">${u.subscription.plan_name}</span></div>
                            <div class="stat-row"><span class="stat-key">Costo:</span> <span class="stat-val" style="color:#4ade80;">$${precioMonto} (${precioFreq})</span></div>
                            <div class="stat-row"><span class="stat-key">Stripe:</span> <span class="stat-val" style="text-align:right;">${stripeCus}${stripeSub}</span></div>
                            <div class="stat-row"><span class="stat-key">Registro:</span> <span class="stat-val">${firstSeen}</span></div>
                        </div>
                        
                        <div>
                            <div class="section-title">🫁 Salud (Actual: ${u.health_and_transport?.weekly_damage?.fecha || 'N/A'})</div>
                            <div class="stat-row"><span class="stat-key">Transporte:</span> <span class="stat-val" style="text-transform:capitalize;">${u.health_and_transport?.transport_mode} (${u.health_and_transport?.transport_hours}h)</span></div>
                            <div class="stat-row"><span class="stat-key">Patologías:</span> <span class="stat-val" style="text-transform:capitalize;">${conditionsHtml}</span></div>
                            <div class="stat-row"><span class="stat-key">PM2.5 Exp:</span> <span class="stat-val">${u.health_and_transport?.weekly_damage?.promedio_pm25 || '0'} µg</span></div>
                            <div class="stat-row"><span class="stat-key">Cig / Días:</span> <span class="stat-val" style="color: #f87171;">🚬 ${u.health_and_transport?.weekly_damage?.cigarros} | ⏳ ${u.health_and_transport?.weekly_damage?.dias_edad_perdidos}</span></div>
                        </div>

                        <div>
                            <div class="section-title">🚗 Vehículo & Contingencia</div>
                            <div class="stat-row"><span class="stat-key">Holograma:</span> <span class="stat-val">${u.vehicle?.hologram || 'N/A'} (${u.vehicle?.engomado || '-'})</span></div>
                            <div class="stat-row"><span class="stat-key">Placa (Fin):</span> <span class="stat-val">${u.vehicle?.plate_last_digit !== null ? u.vehicle.plate_last_digit : 'N/A'}</span></div>
                            <div class="stat-row"><span class="stat-key">Avisos SMS:</span> <span class="stat-val" style="color:${u.global_config.contingency_enabled ? '#4ade80' : '#ef4444'}">${u.global_config.contingency_enabled ? 'ON' : 'OFF'}</span></div>
                        </div>

                        <div>
                            <div class="section-title">📍 Ubicaciones (${u.quotas.locations.used}/${u.quotas.locations.limit})</div>
                            <div style="margin-top: 8px;">${locsHTML}</div>
                        </div>
                        
                        <div>
                            <div class="section-title">📊 Daño Pulmonar (Últimas sem)</div>
                            <div style="margin-top: 8px; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 6px;">
                                ${historyHtml}
                            </div>
                        </div>

                    </div>
                </div>
            `;
            return div;
        }

        // Cargar al inicio
        fetchData();
        
        // Hacer que Plotly se redimensione si volteas el celular
        window.onresize = function() {
            Plotly.Plots.resize(document.getElementById('mrr-chart'));
        };
    </script>
</body>
</html>
